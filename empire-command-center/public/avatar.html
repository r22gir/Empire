<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #avatar { width: 100%; height: 100%; }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #b8960c; font-family: sans-serif; font-size: 14px;
  }
  #error {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    color: #ef4444; font-family: sans-serif; font-size: 13px;
    text-align: center; padding: 20px;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "/three/three.module.js",
    "three/addons/": "/three/addons/"
  }
}
</script>
</head>
<body>
<div id="avatar"></div>
<div id="loading">Loading avatar...</div>
<div id="error"></div>

<script type="module">
import { TalkingHead } from '/talkinghead/talkinghead.mjs';

const container = document.getElementById('avatar');
const loading = document.getElementById('loading');
const errorDiv = document.getElementById('error');
let head = null;

async function init() {
  try {
    head = new TalkingHead(container, {
      cameraView: 'upper',
      cameraRotateEnable: false,
    });

    await head.showAvatar({
      url: '/max-avatar.glb',
      body: 'M',
      avatarMood: 'neutral',
      lipsyncLang: 'en',
    });

    loading.style.display = 'none';
    window.parent.postMessage({ type: 'avatar-loaded', success: true }, '*');
  } catch (e) {
    console.error('Avatar init failed:', e);
    loading.style.display = 'none';
    errorDiv.style.display = 'flex';
    errorDiv.textContent = 'Avatar failed: ' + e.message;
    window.parent.postMessage({ type: 'avatar-loaded', success: false, error: e.message }, '*');
  }
}

// Listen for commands from parent (Command Center)
window.addEventListener('message', async (event) => {
  if (!head) return;
  const { type, text, audio, mood } = event.data || {};

  if (type === 'speak-text' && text) {
    try {
      await head.speakText(text);
    } catch (e) {
      console.error('speakText failed:', e);
    }
  }

  if (type === 'speak-audio' && audio) {
    try {
      await head.speakAudio(audio);
    } catch (e) {
      console.error('speakAudio failed:', e);
    }
  }

  if (type === 'set-mood' && mood) {
    try {
      head.setMood(mood);
    } catch (e) {
      console.error('setMood failed:', e);
    }
  }

  if (type === 'stop-speaking') {
    try {
      head.stopSpeaking();
    } catch (e) {
      console.error('stopSpeaking failed:', e);
    }
  }
});

init();
</script>
</body>
</html>
