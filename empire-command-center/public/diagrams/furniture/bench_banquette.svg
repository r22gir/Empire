<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- L-shape: vertical section (left wall) back -->
  <rect x="15" y="20" width="15" height="130" rx="3" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Horizontal section back -->
  <rect x="15" y="20" width="170" height="50" rx="3" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Vertical seat (left) -->
  <rect x="30" y="70" width="30" height="80" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Horizontal seat (bottom) -->
  <rect x="30" y="70" width="150" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Corner where seats meet -->
  <rect x="30" y="70" width="30" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1"/>
  <!-- Base/legs -->
  <rect x="35" y="150" width="5" height="15" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="170" y="100" width="5" height="15" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Seat cushion divisions -->
  <line x1="90" y1="72" x2="90" y2="98" stroke="#333" stroke-width="0.75" stroke-dasharray="2,3"/>
  <line x1="140" y1="72" x2="140" y2="98" stroke="#333" stroke-width="0.75" stroke-dasharray="2,3"/>
  <line x1="32" y1="110" x2="58" y2="110" stroke="#333" stroke-width="0.75" stroke-dasharray="2,3"/>
</svg>
