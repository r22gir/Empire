<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Chair back frame -->
  <rect x="55" y="20" width="90" height="90" rx="6" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Upholstered back panel (inner) -->
  <rect x="62" y="28" width="76" height="65" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1"/>
  <!-- Seat -->
  <path d="M42,112 L158,112 L165,130 L35,130 Z" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Seat cushion top -->
  <rect x="48" y="108" width="104" height="12" rx="3" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Front legs -->
  <line x1="50" y1="130" x2="42" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="130" x2="158" y2="170" stroke="#333" stroke-width="1.5"/>
  <!-- Back legs (visible behind) -->
  <line x1="60" y1="110" x2="55" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="110" x2="145" y2="170" stroke="#333" stroke-width="1.5"/>
</svg>
