<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Headboard -->
  <path d="M20,25 Q100,15 180,25 L180,120 L20,120 Z" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Diamond tufting -->
  <circle cx="60" cy="45" r="2" fill="#333"/>
  <circle cx="100" cy="40" r="2" fill="#333"/>
  <circle cx="140" cy="45" r="2" fill="#333"/>
  <circle cx="40" cy="65" r="2" fill="#333"/>
  <circle cx="80" cy="62" r="2" fill="#333"/>
  <circle cx="120" cy="62" r="2" fill="#333"/>
  <circle cx="160" cy="65" r="2" fill="#333"/>
  <circle cx="60" cy="82" r="2" fill="#333"/>
  <circle cx="100" cy="80" r="2" fill="#333"/>
  <circle cx="140" cy="82" r="2" fill="#333"/>
  <circle cx="40" cy="102" r="2" fill="#333"/>
  <circle cx="80" cy="100" r="2" fill="#333"/>
  <circle cx="120" cy="100" r="2" fill="#333"/>
  <circle cx="160" cy="102" r="2" fill="#333"/>
  <!-- Tufting lines row 1 to 2 -->
  <line x1="60" y1="45" x2="40" y2="65" stroke="#333" stroke-width="0.4"/>
  <line x1="60" y1="45" x2="80" y2="62" stroke="#333" stroke-width="0.4"/>
  <line x1="100" y1="40" x2="80" y2="62" stroke="#333" stroke-width="0.4"/>
  <line x1="100" y1="40" x2="120" y2="62" stroke="#333" stroke-width="0.4"/>
  <line x1="140" y1="45" x2="120" y2="62" stroke="#333" stroke-width="0.4"/>
  <line x1="140" y1="45" x2="160" y2="65" stroke="#333" stroke-width="0.4"/>
  <!-- Row 2 to 3 -->
  <line x1="40" y1="65" x2="60" y2="82" stroke="#333" stroke-width="0.4"/>
  <line x1="80" y1="62" x2="60" y2="82" stroke="#333" stroke-width="0.4"/>
  <line x1="80" y1="62" x2="100" y2="80" stroke="#333" stroke-width="0.4"/>
  <line x1="120" y1="62" x2="100" y2="80" stroke="#333" stroke-width="0.4"/>
  <line x1="120" y1="62" x2="140" y2="82" stroke="#333" stroke-width="0.4"/>
  <line x1="160" y1="65" x2="140" y2="82" stroke="#333" stroke-width="0.4"/>
  <!-- Row 3 to 4 -->
  <line x1="60" y1="82" x2="40" y2="102" stroke="#333" stroke-width="0.4"/>
  <line x1="60" y1="82" x2="80" y2="100" stroke="#333" stroke-width="0.4"/>
  <line x1="100" y1="80" x2="80" y2="100" stroke="#333" stroke-width="0.4"/>
  <line x1="100" y1="80" x2="120" y2="100" stroke="#333" stroke-width="0.4"/>
  <line x1="140" y1="82" x2="120" y2="100" stroke="#333" stroke-width="0.4"/>
  <line x1="140" y1="82" x2="160" y2="102" stroke="#333" stroke-width="0.4"/>
  <!-- Bed outline -->
  <rect x="15" y="120" width="170" height="10" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Mattress suggestion -->
  <rect x="15" y="130" width="170" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1"/>
  <!-- Bedding line -->
  <line x1="15" y1="145" x2="185" y2="145" stroke="#333" stroke-width="0.5" stroke-dasharray="4,3"/>
</svg>
