<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Back -->
  <rect x="20" y="40" width="160" height="70" rx="8" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Back cushion divisions -->
  <line x1="73" y1="45" x2="73" y2="105" stroke="#333" stroke-width="0.75" stroke-dasharray="2,3"/>
  <line x1="127" y1="45" x2="127" y2="105" stroke="#333" stroke-width="0.75" stroke-dasharray="2,3"/>
  <!-- Seat cushions -->
  <rect x="25" y="105" width="50" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <rect x="75" y="105" width="50" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <rect x="125" y="105" width="50" height="30" rx="4" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Arms -->
  <rect x="10" y="50" width="15" height="90" rx="6" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <rect x="175" y="50" width="15" height="90" rx="6" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="30" y="138" width="6" height="20" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="164" y="138" width="6" height="20" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
</svg>
