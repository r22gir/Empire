<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Back - tall with curved top -->
  <path d="M50,25 Q100,15 150,25 L150,110 L50,110 Z" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Wings -->
  <path d="M50,30 Q25,35 20,55 Q18,75 30,85 L50,80" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <path d="M150,30 Q175,35 180,55 Q182,75 170,85 L150,80" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Seat cushion -->
  <rect x="45" y="110" width="110" height="28" rx="5" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Arms below wings -->
  <path d="M30,85 L35,140 L50,140 L50,80" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <path d="M170,85 L165,140 L150,140 L150,80" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Legs - front -->
  <rect x="55" y="140" width="5" height="22" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="140" y="140" width="5" height="22" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
</svg>
