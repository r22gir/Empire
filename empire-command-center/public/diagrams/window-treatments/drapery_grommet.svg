  <circle cx="88" cy="28" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="112" cy="28" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="132" cy="28" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="152" cy="28" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="172" cy="28" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Fabric folds hanging from grommets -->
  <path d="M28,33 Q30,80 28,185 L38,185 Q42,80 48,33" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <path d="M48,33 Q46,80 48,185 L58,185 Q62,80 68,33" fill="#f5f0e8" stroke="#333" stroke-width="1"/>
