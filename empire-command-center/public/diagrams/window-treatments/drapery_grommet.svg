  <path d="M112,33 Q114,80 112,185 L122,185 Q126,80 132,33" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <path d="M132,33 Q130,80 132,185 L142,185 Q146,80 152,33" fill="#f5f0e8" stroke="#333" stroke-width="1"/>
  <path d="M152,33 Q154,80 152,185 L162,185 Q166,80 172,33" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Floor line -->
