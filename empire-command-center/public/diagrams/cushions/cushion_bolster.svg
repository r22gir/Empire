  <line x1="32" y1="80" x2="38" y2="96" stroke="#333" stroke-width="0.4"/>
  <line x1="52" y1="80" x2="46" y2="96" stroke="#333" stroke-width="0.4"/>
  <line x1="42" y1="105" x2="42" y2="133" stroke="#333" stroke-width="0.4"/>
