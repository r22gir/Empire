<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Flat upholstered panel -->
  <rect x="25" y="20" width="150" height="160" rx="3" fill="#f5f0e8" stroke="#333" stroke-width="1.5"/>
  <!-- Double welt border -->
  <rect x="30" y="25" width="140" height="150" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <!-- Mounting points (top corners) -->
  <circle cx="35" cy="30" r="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <circle cx="165" cy="30" r="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <!-- Subtle fabric weave suggestion -->
  <line x1="35" y1="60" x2="165" y2="60" stroke="#333" stroke-width="0.15"/>
  <line x1="35" y1="80" x2="165" y2="80" stroke="#333" stroke-width="0.15"/>
  <line x1="35" y1="100" x2="165" y2="100" stroke="#333" stroke-width="0.15"/>
  <line x1="35" y1="120" x2="165" y2="120" stroke="#333" stroke-width="0.15"/>
  <line x1="35" y1="140" x2="165" y2="140" stroke="#333" stroke-width="0.15"/>
  <line x1="35" y1="160" x2="165" y2="160" stroke="#333" stroke-width="0.15"/>
</svg>
