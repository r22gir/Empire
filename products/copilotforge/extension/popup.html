<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      color: white;
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .logo {
      font-size: 24px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 11px;
      opacity: 0.7;
    }
    
    .status {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .status-row:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status-value {
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-active {
      color: #4ade80;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #8b5cf6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #7c3aed;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .footer {
      text-align: center;
      font-size: 10px;
      opacity: 0.5;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🔷</span>
    <div>
      <div class="title">CoPilotForge</div>
      <div class="subtitle">Empire Tools</div>
    </div>
  </div>
  
  <div class="status">
    <div class="status-row">
      <span class="status-label">Auto-Save</span>
      <span class="status-value status-active" id="autosave-status">● Active</span>
    </div>
    <div class="status-row">
      <span class="status-label">Last Save</span>
      <span class="status-value" id="last-save">Never</span>
    </div>
    <div class="status-row">
      <span class="status-label">Saves Today</span>
      <span class="status-value" id="save-count">0</span>
    </div>
  </div>
  
  <button class="btn btn-primary" id="save-now">
    💾 Save Now
  </button>
  
  <button class="btn btn-secondary" id="view-history">
    📂 View History
  </button>
  
  <button class="btn btn-secondary" id="export-all">
    📤 Export All
  </button>
  
  <div class="footer">
    v1.0.0 • Auto-saves every 5 minutes
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
