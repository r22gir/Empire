version: "3.8"
services:
  luxeforge:
    image: empirebox/luxeforge:latest
    container_name: empirebox-luxeforge
    restart: unless-stopped
    ports:
      - "8030:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=luxeforge
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=luxeforge"
      - "empirebox.port=8030"

networks:
  empirebox:
    external: true
