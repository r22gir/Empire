version: "3.8"
services:
  shipforge:
    image: empirebox/shipforge:latest
    container_name: empirebox-shipforge
    restart: unless-stopped
    ports:
      - "8060:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=shipforge
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=shipforge"
      - "empirebox.port=8060"

networks:
  empirebox:
    external: true
