version: "3.8"
services:
  leadforge:
    image: empirebox/leadforge:latest
    container_name: empirebox-leadforge
    restart: unless-stopped
    ports:
      - "8050:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=leadforge
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=leadforge"
      - "empirebox.port=8050"

networks:
  empirebox:
    external: true
