version: "3.8"
services:
  forgecrm:
    image: empirebox/forgecrm:latest
    container_name: empirebox-forgecrm
    restart: unless-stopped
    ports:
      - "8070:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=forgecrm
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=forgecrm"
      - "empirebox.port=8070"

networks:
  empirebox:
    external: true
