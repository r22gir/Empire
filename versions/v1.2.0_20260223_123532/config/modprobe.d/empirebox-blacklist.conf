# Blacklist kernel modules that cause hard locks on AZW EQ / Beelink EQR5
# Running sensors-detect probes these modules and causes system freezes
# requiring hard power-off.
#
# DO NOT remove this file unless you have verified the hardware is safe.
# See: docs/BEELINK_STABILITY_GUIDE.md

# Watchdog timer — probed by sensors-detect, causes hard lock on Ryzen 5825U
blacklist sp5100_tco

# Legacy Super I/O sensor drivers — not present on this hardware,
# but probing their I/O ports causes system instability
blacklist w83627ehf
blacklist w83627hf
blacklist it87
blacklist f71805f
