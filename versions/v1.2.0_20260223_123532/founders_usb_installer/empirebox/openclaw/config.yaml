# OpenClaw Configuration - Founders Mode
version: "1.0"
mode: founders

server:
  host: "0.0.0.0"
  port: 7878

# Founders mode: full access, no sandbox
security:
  sandbox: false
  guardrails: false
  founders_mode: true
  allowed_commands: "*"

# AI Models
models:
  default: "ollama/llama3.1:8b"
  coding: "ollama/codellama:7b"
  embedding: "ollama/nomic-embed-text"

# Multi-model support (users add API keys via UI)
providers:
  ollama:
    host: "http://ollama:11434"
    enabled: true
  openai:
    enabled: true
    key_source: ui
  anthropic:
    enabled: true
    key_source: ui
  google:
    enabled: true
    key_source: ui

# Skills
skills:
  - name: empirebox
    path: /app/skills/empirebox.yaml
    enabled: true
  - name: telegram
    path: /app/skills/telegram.yaml
    enabled: true

# Storage
storage:
  conversations: /data/conversations
  skills: /app/skills

# Logging
logging:
  level: info
  file: /var/log/openclaw/openclaw.log
