name: market_forge_app

description: MarketForge - Multi-platform product listing app from EmpireBox

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  camera: ^0.10.5
  image_picker: ^1.0.4
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.7
  intl: ^0.18.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/