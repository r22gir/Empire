version: "3.8"
services:
  relistapp:
    image: empirebox/relistapp:latest
    container_name: empirebox-relistapp
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=relistapp
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=relistapp"
      - "empirebox.port=8080"

networks:
  empirebox:
    external: true
