version: "3.8"
services:
  llcfactory:
    image: empirebox/llcfactory:latest
    container_name: empirebox-llcfactory
    restart: unless-stopped
    ports:
      - "8100:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=llcfactory
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=llcfactory"
      - "empirebox.port=8100"

networks:
  empirebox:
    external: true
