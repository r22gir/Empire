version: "3.8"
services:
  empirepay:
    image: empirebox/empirepay:latest
    container_name: empirebox-empirepay
    restart: unless-stopped
    ports:
      - "8130:8000"
    env_file:
      - /opt/empirebox/.env
    environment:
      - SERVICE_NAME=empirepay
      - SERVICE_PORT=8000
    networks:
      - empirebox
    labels:
      - "empirebox.product=empirepay"
      - "empirebox.port=8130"

networks:
  empirebox:
    external: true
